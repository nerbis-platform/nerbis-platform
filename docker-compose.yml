# Archivo: docker-compose.yml

services:
  # Base de datos PostgreSQL
  db:
    image: postgres:15
    container_name: gravitifyprod_db_container
    environment:
      POSTGRES_DB: gravprod_db
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # Redis (para caché y Celery)
  redis:
    image: redis:7-alpine
    container_name: gravitifyprod_redis
    ports:
      - "6379:6379"

  # Backend Django
  backend:
    build: ./backend
    container_name: gravitifyprod_backend
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      - DATABASE_URL=postgresql://admin:admin123@db:5432/gravprod_db
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - db
      - redis

  # Celery Worker
  celery:
    build: ./backend
    container_name: gravitifyprod_celery
    command: celery -A config worker -l info
    volumes:
      - ./backend:/app
    env_file:
      - ./backend/.env
    environment:
      - DATABASE_URL=postgresql://admin:admin123@db:5432/gravprod_db
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
    depends_on:
      - db
      - redis
      - backend

  # Celery Beat (Scheduler)
  celery-beat:
    build: ./backend
    container_name: gravitifyprod_celery_beat
    command: celery -A config beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    volumes:
      - ./backend:/app
    env_file:
      - ./backend/.env
    environment:
      - DATABASE_URL=postgresql://admin:admin123@db:5432/gravprod_db
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
    depends_on:
      - db
      - redis
      - backend

volumes:
  postgres_data:

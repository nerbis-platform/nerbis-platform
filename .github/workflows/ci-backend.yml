# CI Backend — Se ejecuta cuando hay cambios en backend/
name: CI Backend

on:
  pull_request:
    branches: [main, develop]
    paths:
      - 'backend/**'
      - '.github/workflows/ci-backend.yml'

jobs:
  lint:
    name: Lint (Ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Instalar Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Instalar Ruff
        run: pip install ruff

      - name: Ejecutar Ruff (linting)
        run: ruff check backend/ --output-format=github

      - name: Ejecutar Ruff (formato)
        run: ruff format backend/ --check

  test:
    name: Tests (Pytest)
    runs-on: ubuntu-latest
    needs: lint
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: test_db
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      - name: Instalar Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: backend/requirements-test.txt

      - name: Instalar dependencias (runtime + test)
        run: pip install -r backend/requirements-test.txt

      - name: Ejecutar tests
        env:
          DATABASE_URL: postgresql://test_user:test_password@localhost:5432/test_db
          REDIS_URL: redis://localhost:6379/0
          SECRET_KEY: test-secret-key-only-for-ci
          DEBUG: 'True'
          PLATFORM_BASE_DOMAIN: localhost
        run: |
          cd backend
          python -m pytest -v
